<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart City Citizen Portal</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f4f6f9;
            min-height:100vh;
        }

        .spa-container{
            min-height:80vh;
        }

        .report-card{
            border-left:5px solid #0d6efd;
        }

        .progress{
            height:10px;
        }

        .text-truncate-3{
            display:-webkit-box;
            -webkit-line-clamp:3;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill"></i>
                Smart City Citizen Portal
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent"
                aria-controls="navbarContent"
                aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div
                class="collapse navbar-collapse"
                id="navbarContent">

                <div
                    class="ms-auto"
                    id="nav-menus">

                </div>

            </div>

        </div>

    </nav>

    <main class="container mt-4 spa-container">

        <div id="app-content"></div>

    </main>

    <div
        class="modal fade"
        id="reportModal"
        tabindex="-1"
        aria-labelledby="reportModalLabel"
        aria-hidden="true">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5
                        class="modal-title"
                        id="reportModalLabel">

                        <i class="bi bi-pencil-square"></i>
                        Buat Laporan Baru

                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="reportForm">

                        <div class="mb-3">

                            <label
                                class="form-label">
                                Judul Laporan
                            </label>

                            <input
                                type="text"
                                id="inputTitle"
                                class="form-control"
                                placeholder="Masukkan judul laporan"
                                required>

                        </div>

                        <div class="mb-3">

                            <label
                                class="form-label">
                                Kategori
                            </label>

                            <select
                                id="inputCategory"
                                class="form-select"
                                required>

                                <option value="Fasilitas Umum">Fasilitas Umum</option>
                                <option value="Infrastruktur">Infrastruktur</option>
                                <option value="Kebersihan">Kebersihan</option>
                                <option value="Lingkungan">Lingkungan</option>
                                <option value="Keamanan">Keamanan</option>
                                <option value="Transportasi">Transportasi</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label
                                class="form-label">
                                Lokasi
                            </label>

                            <input
                                type="text"
                                id="inputLocation"
                                class="form-control"
                                placeholder="Masukkan lokasi laporan"
                                required>

                        </div>

                        <div class="mb-3">

                            <label
                                class="form-label">
                                Deskripsi
                            </label>

                            <textarea
                                id="inputDescription"
                                rows="4"
                                class="form-control"
                                placeholder="Tuliskan deskripsi laporan"
                                required></textarea>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Batal

                    </button>

                    <button
                        type="button"
                        class="btn btn-warning"
                        id="btnDraft"
                        onclick="submitReport('DRAFT')">

                        <i class="bi bi-save"></i>
                        Simpan Draft

                    </button>

                    <button
                        type="button"
                        class="btn btn-primary"
                        id="btnSubmit"
                        onclick="submitReport('REPORTED')">

                        <i class="bi bi-send-fill"></i>
                        Kirim Laporan

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>

</body>
</html>
