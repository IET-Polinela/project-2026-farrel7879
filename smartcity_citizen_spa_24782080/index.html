<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Citizen Portal</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link 
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar {
            background: #0d6efd;
        }

        .spa-container {
            min-height: 80vh;
        }

        .report-card {
            border-left: 5px solid #0d6efd;
        }

        .progress {
            height: 10px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">

            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-buildings-fill"></i>
                Smart City Citizen Portal
            </span>

            <div id="nav-menu"></div>

        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container mt-4 spa-container">
        <div id="app-content"></div>
    </main>

    <!-- REPORT MODAL -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="reportModalLabel">
                        <i class="bi bi-pencil-square"></i>
                        Form Laporan
                    </h5>

                    <button 
                        type="button" 
                        class="btn-close" 
                        data-bs-dismiss="modal" 
                        aria-label="Close">
                    </button>
                </div>

                <div class="modal-body">

                    <form id="reportForm">

                        <div class="mb-3">
                            <label for="reportTitle" class="form-label">Judul Laporan</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="reportTitle" 
                                placeholder="Masukkan judul laporan"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="reportCategory" class="form-label">Kategori</label>
                            <select class="form-select" id="reportCategory" required>
                                <option value="">Pilih kategori</option>
                                <option value="infra">Infrastruktur</option>
                                <option value="kebersihan">Kebersihan</option>
                                <option value="lingkungan">Lingkungan</option>
                                <option value="keamanan">Keamanan</option>
                                <option value="transportasi">Transportasi</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="reportLocation" class="form-label">Lokasi</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="reportLocation" 
                                placeholder="Masukkan lokasi laporan"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="reportDescription" class="form-label">Deskripsi</label>
                            <textarea 
                                class="form-control" 
                                id="reportDescription" 
                                rows="4"
                                placeholder="Tuliskan deskripsi laporan"
                                required
                            ></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button 
                                type="button" 
                                class="btn btn-secondary w-50"
                                onclick="submitReport('DRAFT')"
                            >
                                <i class="bi bi-save"></i>
                                Simpan Draft
                            </button>

                            <button 
                                type="button" 
                                class="btn btn-primary w-50"
                                onclick="submitReport('REPORTED')"
                            >
                                <i class="bi bi-send-fill"></i>
                                Ajukan
                            </button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Custom JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>

</body>
</html>
