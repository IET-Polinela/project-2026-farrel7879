<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daftar Laporan</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">Daftar Laporan Smart City</h1>

    <div class="text-end mb-3">
        <a href="{% url 'add_report' %}" class="btn btn-primary">
            + Tambah Laporan
        </a>
    </div>

    <div class="row">
        {% for report in reports %}
        <div class="col-md-6">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">

                    <h5 class="card-title">{{ report.title }}</h5>

                    <p class="card-text">
                        <strong>Kategori:</strong> {{ report.category }} <br>
                        <strong>Lokasi:</strong> {{ report.location }} <br>
                        <strong>Deskripsi:</strong> {{ report.description }}
                    </p>

                    <div class="d-flex justify-content-between">

                        <a href="{% url 'update_report' report.id %}" 
                           class="btn btn-warning btn-sm">
                           Edit
                        </a>

                        <a href="{% url 'delete_report' report.id %}" 
                           class="btn btn-danger btn-sm">
                           Hapus
                        </a>

                    </div>

                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
