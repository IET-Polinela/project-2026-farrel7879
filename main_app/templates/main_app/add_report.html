<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tambah Laporan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">
        
        <h2 class="text-center mb-2">Tambah Laporan</h2>
        <p class="text-center text-muted mb-4">
            Isi form untuk membuat laporan baru
        </p>

        <form method="POST">
            {% csrf_token %}

            <!-- TITLE -->
            <div class="mb-3">
                <label class="form-label fw-bold">Judul Laporan</label>
                <input type="text" 
                       name="title" 
                       class="form-control"
                       required>
            </div>

            <!-- CATEGORY -->
            <div class="mb-3">
                <label class="form-label fw-bold">Kategori</label>
                <input type="text" 
                       name="category" 
                       class="form-control"
                       required>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label fw-bold">Deskripsi</label>
                <textarea name="description" 
                          class="form-control" 
                          rows="5"
                          required></textarea>
            </div>

            <!-- LOCATION -->
            <div class="mb-4">
                <label class="form-label fw-bold">Lokasi</label>
                <input type="text" 
                       name="location" 
                       class="form-control"
                       required>
            </div>

            <!-- BUTTON -->
            <div class="d-flex justify-content-between">

                <!-- FIX DI SINI -->
                <a href="{% url 'report_list' %}" 
                   class="btn btn-secondary px-4">
                    ← Kembali
                </a>

                <button type="submit" 
                        class="btn btn-success px-4">
                    Simpan Laporan
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
