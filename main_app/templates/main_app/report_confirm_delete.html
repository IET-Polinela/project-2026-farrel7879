<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hapus Laporan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4 text-center">

        <h2 class="text-danger mb-3">Konfirmasi Hapus</h2>

        <p class="mb-4">
            Apakah kamu yakin ingin menghapus laporan ini?
        </p>

        <!-- DATA YANG MAU DIHAPUS -->
        <div class="mb-4">
            <h5>{{ object.title }}</h5>
            <p class="text-muted">{{ object.description }}</p>
        </div>

        <!-- FORM DELETE -->
        <form method="POST">
            {% csrf_token %}

            <div class="d-flex justify-content-center gap-3">

                <a href="{% url 'report_list' %}" 
                   class="btn btn-secondary px-4">
                    Batal
                </a>

                <button type="submit" 
                        class="btn btn-danger px-4">
                    Hapus
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
