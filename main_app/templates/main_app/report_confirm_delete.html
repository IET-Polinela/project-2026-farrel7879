{% extends 'base.html' %}
{% block content %}

<style>
.delete-wrapper {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.delete-modal {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px;
    width: 400px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);

    animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.delete-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

.delete-warning {
    font-size: 40px;
}

.delete-text {
    color: #6c757d;
    margin-bottom: 20px;
}

</style>

<div class="delete-wrapper">

<div class="delete-modal">

<div class="delete-warning">⚠️</div>

<div class="delete-title text-danger">
Konfirmasi Hapus
</div>

<p class="delete-text">
Yakin mau hapus laporan
</p>

<h5 class="fw-bold mb-4">
{{ object.title }}
</h5>

<form method="POST">
{% csrf_token %}

<div class="d-flex justify-content-center gap-3">

<a href="{% url 'report_list' %}" 
   class="btn btn-outline-secondary">
Batal
</a>

<button type="submit" 
        class="btn btn-danger">
Hapus
</button>

</div>

</form>

</div>

</div>

{% endblock %}
