{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}Smart City{% endblock %}</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
    min-height: 100vh;
}

/* BACKGROUND EFFECT */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(14,165,233,0.08), transparent 70%);
    top: -120px;
    right: -120px;
    z-index: -1;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(135deg,#0a2540,#0ea5e9);
    padding: 12px 20px;
}

/* BUTTON */
.btn-ocean {
    background: linear-gradient(135deg,#0ea5e9,#0284c7);
    color:white;
    border-radius:12px;
    border:none;
}

.btn-ocean:hover {
    opacity: 0.9;
}

/* MAIN WRAPPER */
.main-wrapper {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* BREADCRUMB */
.breadcrumb {
    background: transparent;
    margin-bottom: 15px;
    font-size: 14px;
}

.breadcrumb a {
    text-decoration: none;
    color: #0ea5e9;
}

.breadcrumb-item.active {
    color: #64748b;
}

/* CARD */
.card-smooth {
    border-radius: 20px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.05);
}

/* ANIMATION */
.fade-in {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container-fluid">

        <a class="text-white fw-bold" href="/">Smart City</a>

        <!-- 🔥 FIX: tambah menu biar sesuai lab -->
        <div class="ms-auto d-flex gap-3 align-items-center">

            <a href="/" class="text-white text-decoration-none">Home</a>
            <a href="/reports/" class="text-white text-decoration-none">Reports</a>

            <a href="{% url 'add_report' %}" class="btn btn-ocean btn-sm">
                + Tambah
            </a>

        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="container main-wrapper fade-in">  <!-- 🔥 FIX: hapus typo -->

    <!-- ALERT -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show">
                {{ message }}
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <!-- BREADCRUMB -->
    {% block breadcrumb %}
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item active">Home</li>
      </ol>
    </nav>
    {% endblock %}

    <!-- CONTENT -->
    <div class="mt-3">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 LOADING SCRIPT FIX -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("form").forEach(form => {

        form.addEventListener("submit", function () {

            const btn = form.querySelector("button[type='submit']");

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    Loading...
                `;
            }

        });

    });
});
</script>

</body>
</html>
